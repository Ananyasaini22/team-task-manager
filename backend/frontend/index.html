<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Task Manager — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1>Task<span style="color:var(--accent)">Flow</span></h1>
      <p class="subtitle">Manage projects and tasks with your team</p>

      <div class="auth-tabs">
        <button id="tab-login" class="active">Sign In</button>
        <button id="tab-signup">Sign Up</button>
      </div>

      <!-- Login form -->
      <form id="form-login">
        <div id="error-login" class="alert alert-error hidden"></div>
        <div class="form-group">
          <label for="login-email">Email</label>
          <input id="login-email" type="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input id="login-password" type="password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px">Sign In</button>
      </form>

      <!-- Signup form -->
      <form id="form-signup" class="hidden">
        <div id="error-signup" class="alert alert-error hidden"></div>
        <div class="form-group">
          <label for="signup-name">Full Name</label>
          <input id="signup-name" type="text" placeholder="Jane Smith" required minlength="2" />
        </div>
        <div class="form-group">
          <label for="signup-email">Email</label>
          <input id="signup-email" type="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="signup-password">Password <span class="text-muted">(min 6 chars)</span></label>
          <input id="signup-password" type="password" placeholder="••••••••" required minlength="6" />
        </div>
        <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px">Create Account</button>
      </form>
    </div>
  </div>

  <script src="/static/app.js"></script>
  <script>initAuthPage();</script>
</body>
</html>
